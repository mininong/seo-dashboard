name: Update GSC Data

on:
  schedule:
    # รันอัตโนมัติทุกๆ เที่ยงคืนของทุกวัน (เวลา UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: 
    # อนุญาตให้กดรันแบบ Manual ได้จากหน้า GitHub

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Fetch data from GSC
        env:
          GSC_CREDENTIALS: ${{ secrets.GSC_CREDENTIALS }}
        run: python fetch_gsc.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          # Commit เฉพาะเมื่อไฟล์มีการเปลี่ยนแปลง
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update GSC data" && git push)
